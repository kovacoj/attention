name: Build report and deploy Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - "report/**"
      - ".github/workflows/report-pages.yml"
  pull_request:
    branches: [main]
    paths:
      - "report/**"
      - ".github/workflows/report-pages.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Compile LaTeX report
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Compile report PDF
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: report
          root_file: paper.tex
          texlive_version: latest
          extra_system_packages: coreutils icu inkscape ghostscript perl sed findutils

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: report-pdf
          path: report/paper.pdf

  deploy:
    name: Deploy to Pages branch
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download PDF artifact
        uses: actions/download-artifact@v4
        with:
          name: report-pdf

      - name: Check out deploy branch
        uses: actions/checkout@v4
        with:
          ref: deploy
          path: deploy-dir

      - name: Update deploy branch
        run: |
          cp paper.pdf deploy-dir/report.pdf
          cd deploy-dir
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add report.pdf
          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "deploy: update report.pdf"
            git push origin deploy
          fi

      - name: Clean up
        run: rm -rf deploy-dir
