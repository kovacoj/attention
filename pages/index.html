<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mixed-Precision Randomized Sketching for Scaled Dot-Product Attention</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f8f8fb;
      --fg: #1b1d22;
      --muted: #5a6170;
      --card: #ffffff;
      --accent: #3a63ff;
      --border: #d9dfeb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1117;
        --fg: #eef2ff;
        --muted: #a6afc3;
        --card: #171a23;
        --accent: #8dadff;
        --border: #2a3143;
      }
    }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
    }
    main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }
    .hero {
      margin-bottom: 1.5rem;
      padding: 1.5rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(1.8rem, 4vw, 2.7rem);
      line-height: 1.05;
    }
    p {
      margin: 0.35rem 0;
      line-height: 1.6;
    }
    .meta {
      color: var(--muted);
    }
    .actions {
      margin-top: 1rem;
    }
    .actions a {
      display: inline-block;
      margin-right: 0.75rem;
      padding: 0.7rem 1rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--fg);
      text-decoration: none;
      font-weight: 600;
    }
    .actions a.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .viewer {
      overflow: hidden;
      min-height: 80vh;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
    }
    iframe {
      width: 100%;
      height: 80vh;
      border: 0;
      background: white;
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <h1>Mixed-Precision Randomized Sketching for Scaled Dot-Product Attention</h1>
      <p class="meta">Ján Kovačovský · Term paper draft · Mathematical Foundations of Machine Learning</p>
      <p>
        This page publishes the current compiled PDF of the report directly from GitHub Actions.
      </p>
      <div class="actions">
        <a class="primary" href="report.pdf">Open PDF</a>
        <a href="report.pdf" download>Download PDF</a>
      </div>
    </section>
    <section class="viewer">
      <iframe src="report.pdf" title="Report PDF"></iframe>
    </section>
  </main>
</body>
</html>
